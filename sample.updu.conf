# updu sample configuration
# This file contains 15 example monitors covering all supported types.
# You can use this as a template for your own GitOps configuration.

host: 0.0.0.0
port: 3000
base_url: http://localhost:3000
log_level: info

# Optional auth hardening
# password_policy: strong # off, default, strong, very_secure

monitors:
  # 1. HTTP Monitor - Basic Website Check
  - name: "Google Homepage"
    type: "http"
    groups: ["Websites"]
    tags: ["google", "public"]
    interval: "1m"
    config:
      url: "https://www.google.com"
      method: "GET"
      expected_status: 200

  # 2. JSON API Monitor - Health Check
  - name: "Self Health API"
    type: "json_api"
    groups: ["Internal"]
    interval: "30s"
    config:
      url: "http://localhost:3000/api/v1/system/health"
      field: "status"
      expected_value: "ok"

  # 3. TCP Monitor - Database Port
  - name: "Local Redis Port"
    type: "tcp"
    groups: ["Infrastructure", "Databases"]
    interval: "1m"
    config:
      host: "localhost"
      port: 6379

  # 4. ICMP Ping Monitor
  - name: "Cloudflare DNS"
    type: "ping"
    groups: ["Network"]
    interval: "1m"
    config:
      host: "1.1.1.1"
      count: 3

  # 5. DNS Monitor
  - name: "Google DNS Resolution"
    type: "dns"
    groups: ["Network"]
    interval: "5m"
    config:
      host: "google.com"
      record_type: "A"
      resolver: "8.8.8.8"

  # 6. SSL Expiration Monitor
  - name: "Google SSL Cert"
    type: "ssl"
    groups: ["Security"]
    interval: "24h"
    config:
      host: "google.com"
      port: 443
      days_before_expiry: 14

  # 7. SSH Connectivity Monitor
  - name: "Local SSH Server"
    type: "ssh"
    groups: ["Infrastructure"]
    interval: "5m"
    config:
      host: "localhost"
      port: 22

  # 8. Push (Heartbeat) Monitor
  # This expects a periodic request to /api/v1/heartbeat/backup-job
  - name: "Daily Backup Job"
    type: "push"
    groups: ["Jobs"]
    interval: "24h"
    config:
      token: "secure-backup-token-123"

  # 9. WebSocket Monitor
  - name: "Public Echo WebSocket"
    type: "websocket"
    groups: ["Websites"]
    interval: "5m"
    config:
      url: "wss://echo.websocket.org"

  # 10. SMTP Monitor
  - name: "Gmail SMTP"
    type: "smtp"
    groups: ["Services"]
    interval: "10m"
    config:
      host: "smtp.gmail.com"
      port: 587
      require_tls: true

  # 11. UDP Monitor
  - name: "Local NTP"
    type: "udp"
    groups: ["Network"]
    interval: "5m"
    config:
      host: "pool.ntp.org"
      port: 123

  # 12. Redis Monitor
  - name: "Production Redis"
    type: "redis"
    groups: ["Databases"]
    interval: "1m"
    config:
      host: "localhost"
      port: 6379
      database: 0

  # 13. PostgreSQL Monitor
  - name: "App Database (Postgres)"
    type: "postgres"
    groups: ["Databases"]
    interval: "1m"
    config:
      host: "localhost"
      port: 5432
      user: "postgres"
      database: "postgres"
      ssl_mode: "disable"

  # 14. MySQL Monitor
  - name: "Legacy DB (MySQL)"
    type: "mysql"
    groups: ["Databases"]
    interval: "1m"
    config:
      host: "localhost"
      port: 3306
      user: "root"
      database: "mysql"

  # 15. MongoDB Monitor
  - name: "Document Store (Mongo)"
    type: "mongodb"
    groups: ["Databases"]
    interval: "5m"
    config:
      connection_string: "mongodb://localhost:27017"
