# updu sample configuration
# Broad example covering every built-in monitor type.
# Uses public endpoints where practical; database, push, and internal-service
# monitors remain placeholders that you should replace before using in production.
# Smaller scenario-based examples live under examples/configs/.
# Prefer environment variables for secrets such as auth_secret, metrics_token,
# and OIDC client credentials.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
db_path: ./data/updu.db
log_level: info
session_ttl_days: 7
password_policy: strong
worker_pool_size: 8
min_interval_s: 30
enable_custom_css: false
trusted_proxy_cidrs:
  - 10.0.0.0/8
  - 192.168.0.0/16

monitors:
  - id: public-homepage
    name: Public Homepage
    type: http
    groups: [Web]
    tags: [prod, public]
    interval: 1m
    timeout: 10s
    retries: 1
    config:
      url: https://example.com
      method: GET
      expected_status: 200
      expected_body: Example Domain

  - id: api-health-json
    name: GitHub API Root
    type: json
    groups: [API]
    interval: 30s
    timeout: 10s
    config:
      url: https://api.github.com
      method: GET
      field: current_user_url
      expected_value: https://api.github.com/user

  - id: public-tcp-port
    name: GitHub HTTPS Port
    type: tcp
    groups: [Edge]
    interval: 2m
    config:
      host: github.com
      port: 443

  - id: public-anycast-ping
    name: Public Anycast Ping
    type: ping
    groups: [Network]
    interval: 1m
    config:
      host: 1.1.1.1
      count: 3

  - id: authoritative-dns
    name: Authoritative DNS
    type: dns
    groups: [Network]
    interval: 5m
    config:
      host: example.com
      record_type: A
      resolver: 1.1.1.1

  - id: public-cert-check
    name: GitHub Certificate Check
    type: ssl
    groups: [Security]
    interval: 6h
    config:
      host: github.com
      port: 443
      days_before_expiry: 21

  - id: bastion-ssh
    name: GitHub SSH Banner
    type: ssh
    groups: [Infra]
    interval: 5m
    config:
      host: github.com
      port: 22

  - id: nightly-backup-heartbeat
    name: Nightly Backup Heartbeat
    type: push
    groups: [Jobs]
    interval: 24h
    config:
      token: nightly-backup-heartbeat-token

  - id: websocket-echo
    name: WebSocket Echo
    type: websocket
    groups: [Web]
    interval: 5m
    config:
      url: wss://echo.websocket.events

  - id: smtp-relay
    name: Gmail Submission
    type: smtp
    groups: [Mail]
    interval: 10m
    config:
      host: smtp.gmail.com
      port: 587
      require_tls: true

  - id: public-dns-udp
    name: Public DNS UDP
    type: udp
    groups: [Network]
    interval: 5m
    config:
      host: 1.1.1.1
      port: 53

  - id: redis-cache
    name: Redis Cache
    type: redis
    groups: [Data]
    interval: 1m
    config:
      host: redis.internal.example
      port: 6379
      database: 0
      password: replace-me

  - id: postgres-primary
    name: Postgres Primary
    type: postgres
    groups: [Data]
    interval: 2m
    config:
      host: postgres.internal.example
      port: 5432
      user: monitor
      password: replace-me
      database: app
      ssl_mode: require

  - id: mysql-legacy
    name: MySQL Legacy
    type: mysql
    groups: [Data]
    interval: 2m
    config:
      connection_string: monitor:replace-me@tcp(mysql.internal.example:3306)/legacy

  - id: mongo-cluster
    name: Mongo Cluster
    type: mongo
    groups: [Data]
    interval: 5m
    config:
      connection_string: mongodb://monitor:replace-me@mongo.internal.example:27017/admin

  - id: tls-readiness
    name: Example TLS Readiness
    type: https
    groups: [Web]
    interval: 10m
    config:
      url: https://example.com
      expected_status: 200
      warn_days: 21

  - id: github-routing
    name: GitHub WWW Routing
    type: dns_http
    groups: [Edge]
    interval: 5m
    config:
      url: https://www.github.com
      expected_cname: github.com
      expected_status: 200
      expected_body: GitHub

  - id: postman-echo-transaction
    name: Postman Echo Transaction
    type: transaction
    groups: [Synthetic]
    interval: 5m
    timeout: 20s
    config:
      steps:
        - method: GET
          url: https://postman-echo.com/get?token=demo
          expected_status: 200
          extract:
            access_token: args.token
        - method: GET
          url: https://postman-echo.com/get?stage=cart&auth={{access_token}}
          expected_status: 200
          expected_body: cart
        - method: POST
          url: https://postman-echo.com/post
          headers:
            Content-Type: application/json
          body: '{"token":"{{access_token}}","sku":"demo-plan"}'
          expected_status: 200
          expected_body: demo-plan

  - id: public-edge-quorum
    name: Public Edge Quorum
    type: composite
    groups: [Synthetic]
    interval: 30s
    config:
      monitor_ids:
        - public-homepage
        - api-health-json
        - tls-readiness
        - github-routing
        - postman-echo-transaction
      mode: quorum
      quorum: 4
