# updu sample configuration
# Broad example covering every built-in monitor type.
# Replace placeholder domains, credentials, and tokens before using it.
# Smaller scenario-based examples live under examples/configs/.
# Prefer environment variables for secrets such as auth_secret, metrics_token,
# and OIDC client credentials.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
db_path: ./data/updu.db
log_level: info
session_ttl_days: 7
password_policy: strong
worker_pool_size: 8
min_interval_s: 30
enable_custom_css: false
trusted_proxy_cidrs:
  - 10.0.0.0/8
  - 192.168.0.0/16

monitors:
  - id: public-homepage
    name: Public Homepage
    type: http
    groups: [Web]
    tags: [prod, public]
    interval: 1m
    timeout: 10s
    retries: 1
    config:
      url: https://example.com
      method: GET
      expected_status: 200
      expected_body: Example Domain

  - id: api-health-json
    name: API Health JSON
    type: json
    groups: [API]
    interval: 30s
    timeout: 10s
    config:
      url: https://api.example.com/health
      method: GET
      field: status
      expected_value: ok

  - id: public-tcp-port
    name: Public TCP Port
    type: tcp
    groups: [Edge]
    interval: 2m
    config:
      host: edge.example.com
      port: 443

  - id: public-anycast-ping
    name: Public Anycast Ping
    type: ping
    groups: [Network]
    interval: 1m
    config:
      host: 1.1.1.1
      count: 3

  - id: authoritative-dns
    name: Authoritative DNS
    type: dns
    groups: [Network]
    interval: 5m
    config:
      host: example.com
      record_type: A
      resolver: 1.1.1.1

  - id: public-cert-check
    name: Public Certificate Check
    type: ssl
    groups: [Security]
    interval: 6h
    config:
      host: example.com
      port: 443
      days_before_expiry: 21

  - id: bastion-ssh
    name: Bastion SSH
    type: ssh
    groups: [Infra]
    interval: 5m
    config:
      host: bastion.example.com
      port: 22

  - id: nightly-backup-heartbeat
    name: Nightly Backup Heartbeat
    type: push
    groups: [Jobs]
    interval: 24h
    config:
      token: nightly-backup-heartbeat-token

  - id: websocket-echo
    name: WebSocket Echo
    type: websocket
    groups: [Web]
    interval: 5m
    config:
      url: wss://echo.websocket.events

  - id: smtp-relay
    name: SMTP Relay
    type: smtp
    groups: [Mail]
    interval: 10m
    config:
      host: smtp.example.com
      port: 587
      require_tls: true

  - id: ntp-udp
    name: NTP UDP
    type: udp
    groups: [Network]
    interval: 5m
    config:
      host: ntp.example.com
      port: 123

  - id: redis-cache
    name: Redis Cache
    type: redis
    groups: [Data]
    interval: 1m
    config:
      host: redis.internal.example
      port: 6379
      database: 0
      password: replace-me

  - id: postgres-primary
    name: Postgres Primary
    type: postgres
    groups: [Data]
    interval: 2m
    config:
      host: postgres.internal.example
      port: 5432
      user: monitor
      password: replace-me
      database: app
      ssl_mode: require

  - id: mysql-legacy
    name: MySQL Legacy
    type: mysql
    groups: [Data]
    interval: 2m
    config:
      connection_string: monitor:replace-me@tcp(mysql.internal.example:3306)/legacy

  - id: mongo-cluster
    name: Mongo Cluster
    type: mongo
    groups: [Data]
    interval: 5m
    config:
      connection_string: mongodb://monitor:replace-me@mongo.internal.example:27017/admin

  - id: tls-readiness
    name: TLS Readiness
    type: https
    groups: [Web]
    interval: 10m
    config:
      url: https://app.example.com/readyz
      expected_status: 200
      warn_days: 21

  - id: cdn-dns-http
    name: CDN DNS Plus HTTP
    type: dns_http
    groups: [Edge]
    interval: 5m
    config:
      url: https://cdn.example.com/healthz
      expected_ip_prefix: 203.0.113.
      expected_status: 200

  - id: checkout-transaction
    name: Checkout Transaction
    type: transaction
    groups: [Synthetic]
    interval: 5m
    timeout: 20s
    config:
      steps:
        - method: POST
          url: https://api.example.com/v1/login
          headers:
            Content-Type: application/json
          body: '{"username":"monitor","password":"replace-me"}'
          expected_status: 200
          extract:
            access_token: token
        - method: GET
          url: https://api.example.com/v1/cart
          headers:
            Authorization: Bearer {{access_token}}
          expected_status: 200
          expected_body: items
        - method: POST
          url: https://api.example.com/v1/checkout/preview
          headers:
            Authorization: Bearer {{access_token}}
            Content-Type: application/json
          body: '{"sku":"demo-plan","quantity":1}'
          expected_status: 200
          expected_body: total

  - id: public-edge-quorum
    name: Public Edge Quorum
    type: composite
    groups: [Synthetic]
    interval: 30s
    config:
      monitor_ids:
        - public-homepage
        - api-health-json
        - tls-readiness
        - cdn-dns-http
        - checkout-transaction
      mode: quorum
      quorum: 4
