# Smallest practical GitOps config.
# Good starting point for a single public site plus one edge host.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
log_level: info

monitors:
  - id: homepage
    name: Homepage
    type: http
    groups: [Public]
    interval: 1m
    config:
      url: https://example.com
      expected_status: 200

  - id: edge-gateway-ping
    name: Edge Gateway Ping
    type: ping
    groups: [Network]
    interval: 1m
    config:
      host: 1.1.1.1

  - id: public-certificate
    name: Public Certificate
    type: ssl
    groups: [Security]
    interval: 1h
    config:
      host: example.com
      port: 443
      days_before_expiry: 14