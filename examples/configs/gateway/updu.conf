# updu Gateway Stack Configuration
#
# This configuration demonstrates monitoring a multi-tier gateway architecture,
# including edge proxies, API gateways, auth providers, and backend dependencies.
#
# Topology:
#   Edge (Traefik/Nginx) -> API Gateway (Kong/Tyk) -> Services & Data

host: 0.0.0.0
port: 3000
log_level: info

monitors:
  # --- Tier 1: Edge & Infrastructure ---
  - id: edge-load-balancer-http
    name: Edge Load Balancer (HTTP)
    type: http
    groups: [Edge]
    interval: 1m
    config:
      url: http://lb.internal.example/healthz
      expected_status: 200

  - id: edge-tls-cert
    name: Edge SSL Certificate
    type: ssl
    groups: [Edge, Security]
    interval: 12h
    config:
      host: api.example.com
      port: 443
      days_before_expiry: 14

  - id: dns-resolution-gateway
    name: Gateway DNS Resolution
    type: dns
    groups: [Edge]
    interval: 5m
    config:
      host: api.example.com
      record_type: A
      resolver: 1.1.1.1

  # --- Tier 2: API Gateway & Auth ---
  - id: api-gateway-admin-api
    name: API Gateway Admin API
    type: json
    groups: [Gateway]
    interval: 1m
    config:
      url: http://gateway.internal.example:8001/status
      method: GET
      field: database.reachable
      expected_value: "true"

  - id: api-gateway-grpc-service
    name: API Gateway gRPC Interface
    type: grpc
    groups: [Gateway]
    interval: 1m
    config:
      host: gateway.internal.example
      port: 9090
      tls: false

  - id: identity-provider-oidc
    name: Identity Provider (OIDC)
    type: http
    groups: [Auth]
    interval: 2m
    config:
      url: https://auth.example.com/.well-known/openid-configuration
      expected_status: 200

  # --- Tier 3: Core Services & Persistence ---
  - id: core-api-transaction
    name: Core API Synthetic Transaction
    type: transaction
    groups: [Services]
    interval: 2m
    config:
      steps:
        - method: POST
          url: https://api.example.com/v1/auth/token
          body: '{"client_id":"monitor","client_secret":"replace-me"}'
          extract:
            access_token: access_token
        - method: GET
          url: https://api.example.com/v1/user/profile
          headers:
            Authorization: "Bearer {{access_token}}"
          expected_status: 200
          expected_body: "monitor@example.com"

  - id: session-cache-redis
    name: Session Cache (Redis)
    type: redis
    groups: [Data]
    interval: 1m
    config:
      host: redis-cache.internal.example
      port: 6379

  - id: gateway-config-db
    name: Gateway Config DB (Postgres)
    type: postgres
    groups: [Data]
    interval: 2m
    config:
      host: pg-gateway.internal.example
      port: 5432
      user: updu_monitor
      database: gateway_config

  # --- Tier 4: Observability ---
  - id: prometheus-gateway-metrics
    name: Gateway Request Latency (Prometheus)
    type: prometheus
    groups: [Observability]
    interval: 2m
    config:
      host: prometheus.internal.example
      port: 9090
      metric_name: gateway_http_latency_ms_bucket
      expected_value: "500"
      comparison: lt
