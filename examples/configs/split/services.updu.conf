monitors:
  - id: api-json
    name: API JSON Health
    type: json
    groups: [Services]
    interval: 30s
    config:
      url: https://api.example.com/health
      field: status
      expected_value: ok

  - id: tls-gateway
    name: TLS Gateway
    type: https
    groups: [Services]
    interval: 10m
    config:
      url: https://app.example.com/readyz
      expected_status: 200
      warn_days: 14

  - id: deploy-heartbeat
    name: Deploy Heartbeat
    type: push
    groups: [Jobs]
    interval: 30m
    config:
      token: deploy-pipeline-heartbeat