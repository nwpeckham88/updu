monitors:
  - id: api-json
    name: GitHub API Root
    type: json
    groups: [Services]
    interval: 30s
    config:
      url: https://api.github.com
      field: current_user_url
      expected_value: https://api.github.com/user

  - id: tls-gateway
    name: Example TLS
    type: https
    groups: [Services]
    interval: 10m
    config:
      url: https://example.com
      expected_status: 200
      warn_days: 21

  - id: websocket-echo
    name: WebSocket Echo
    type: websocket
    groups: [Services]
    interval: 5m
    config:
      url: wss://echo.websocket.events

  - id: gmail-submission
    name: Gmail Submission
    type: smtp
    groups: [Services]
    interval: 10m
    config:
      host: smtp.gmail.com
      port: 587
      require_tls: true

  - id: deploy-heartbeat
    name: Deploy Heartbeat
    type: push
    groups: [Jobs]
    interval: 30m
    config:
      token: deploy-pipeline-heartbeat

  - id: redis-cache
    name: Redis Cache
    type: redis
    groups: [Data]
    interval: 1m
    config:
      host: redis.internal.example
      port: 6379
      database: 0
      password: replace-me

  - id: postgres-primary
    name: Postgres Primary
    type: postgres
    groups: [Data]
    interval: 2m
    config:
      host: postgres.internal.example
      port: 5432
      user: monitor
      password: replace-me
      database: app
      ssl_mode: require

  - id: mysql-legacy
    name: MySQL Legacy
    type: mysql
    groups: [Data]
    interval: 2m
    config:
      connection_string: monitor:replace-me@tcp(mysql.internal.example:3306)/legacy

  - id: mongo-cluster
    name: Mongo Cluster
    type: mongo
    groups: [Data]
    interval: 5m
    config:
      connection_string: mongodb://monitor:replace-me@mongo.internal.example:27017/admin

  - id: postman-echo-transaction
    name: Postman Echo Transaction
    type: transaction
    groups: [Synthetic]
    interval: 5m
    timeout: 20s
    config:
      steps:
        - method: GET
          url: https://postman-echo.com/get?token=demo
          expected_status: 200
          extract:
            access_token: args.token
        - method: GET
          url: https://postman-echo.com/get?stage=cart&auth={{access_token}}
          expected_status: 200
          expected_body: cart
        - method: POST
          url: https://postman-echo.com/post
          headers:
            Content-Type: application/json
          body: '{"token":"{{access_token}}","sku":"demo-plan"}'
          expected_status: 200
          expected_body: demo-plan