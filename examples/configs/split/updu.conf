# Multi-file GitOps example.
# Using this directory as UPDU_CONF_PATH loads this file plus companion
# *.updu.conf files in the same directory.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
log_level: info
password_policy: strong

monitors:
  - id: status-landing
    name: Status Landing Page
    type: http
    groups: [Public]
    interval: 1m
    config:
      url: https://status.example.com
      expected_status: 200