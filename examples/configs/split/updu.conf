# Multi-file GitOps example.
# Using this directory as UPDU_CONF_PATH loads this file plus companion
# *.updu.conf files in the same directory.
# Together, the split files demonstrate every built-in monitor type.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
log_level: info
password_policy: strong

monitors:
  - id: status-landing
    name: Example Landing Page
    type: http
    groups: [Public]
    interval: 1m
    config:
      url: https://example.com
      expected_status: 200
      expected_body: Example Domain

  - id: public-surface-quorum
    name: Public Surface Quorum
    type: composite
    groups: [Public]
    interval: 30s
    config:
      monitor_ids:
        - status-landing
        - api-json
        - tls-gateway
        - github-routing
        - postman-echo-transaction
      mode: quorum
      quorum: 4