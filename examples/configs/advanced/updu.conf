# Compound monitor example: synthetic flow + TLS + DNS + quorum.
# Useful when you want user-journey coverage instead of only single probes.
# Replace any replace-me secrets before deploying this sample.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
log_level: info

monitors:
  - id: frontend-http
    name: Frontend HTTP
    type: http
    groups: [Checkout]
    interval: 30s
    config:
      url: https://www.example.com
      expected_status: 200

  - id: api-json
    name: API Health JSON
    type: json
    groups: [Checkout]
    interval: 30s
    config:
      url: https://api.example.com/health
      field: status
      expected_value: ok

  - id: tls-gateway
    name: TLS Gateway
    type: https
    groups: [Checkout]
    interval: 10m
    config:
      url: https://app.example.com/readyz
      expected_status: 200
      warn_days: 21

  - id: edge-routing
    name: Edge Routing
    type: dns_http
    groups: [Checkout]
    interval: 5m
    config:
      url: https://cdn.example.com/healthz
      expected_ip_prefix: 203.0.113.
      expected_status: 200

  - id: checkout-flow
    name: Checkout Flow
    type: transaction
    groups: [Checkout]
    interval: 5m
    timeout: 20s
    config:
      steps:
        - method: POST
          url: https://api.example.com/v1/login
          headers:
            Content-Type: application/json
          body: '{"username":"monitor","password":"replace-me"}'
          expected_status: 200
          extract:
            access_token: token
        - method: GET
          url: https://api.example.com/v1/cart
          headers:
            Authorization: Bearer {{access_token}}
          expected_status: 200
          expected_body: items
        - method: POST
          url: https://api.example.com/v1/checkout/preview
          headers:
            Authorization: Bearer {{access_token}}
            Content-Type: application/json
          body: '{"sku":"demo-plan","quantity":1}'
          expected_status: 200
          expected_body: total

  - id: checkout-quorum
    name: Checkout Quorum
    type: composite
    groups: [Checkout]
    interval: 30s
    config:
      monitor_ids:
        - frontend-http
        - api-json
        - tls-gateway
        - edge-routing
        - checkout-flow
      mode: quorum
      quorum: 4