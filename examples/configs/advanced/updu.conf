# Compound monitor example: synthetic flow + TLS + DNS + quorum.
# Uses public endpoints where practical so you can try it quickly before
# swapping in your own routing checks and user journeys.
# Replace any replace-me secrets before deploying this sample.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
log_level: info

monitors:
  - id: frontend-http
    name: Example HTTP
    type: http
    groups: [Synthetic]
    interval: 30s
    config:
      url: https://example.com
      expected_status: 200
      expected_body: Example Domain

  - id: api-json
    name: GitHub API Root
    type: json
    groups: [Synthetic]
    interval: 30s
    config:
      url: https://api.github.com
      field: current_user_url
      expected_value: https://api.github.com/user

  - id: tls-gateway
    name: Example TLS
    type: https
    groups: [Synthetic]
    interval: 10m
    config:
      url: https://example.com
      expected_status: 200
      warn_days: 21

  - id: edge-routing
    name: GitHub WWW Routing
    type: dns_http
    groups: [Synthetic]
    interval: 5m
    config:
      url: https://www.github.com
      expected_cname: github.com
      expected_status: 200
      expected_body: GitHub

  - id: postman-echo-transaction
    name: Postman Echo Transaction
    type: transaction
    groups: [Synthetic]
    interval: 5m
    timeout: 20s
    config:
      steps:
        - method: GET
          url: https://postman-echo.com/get?token=demo
          expected_status: 200
          extract:
            access_token: args.token
        - method: GET
          url: https://postman-echo.com/get?stage=cart&auth={{access_token}}
          expected_status: 200
          expected_body: cart
        - method: POST
          url: https://postman-echo.com/post
          headers:
            Content-Type: application/json
          body: '{"token":"{{access_token}}","sku":"demo-plan"}'
          expected_status: 200
          expected_body: demo-plan

  - id: checkout-quorum
    name: Public Surface Quorum
    type: composite
    groups: [Synthetic]
    interval: 30s
    config:
      monitor_ids:
        - frontend-http
        - api-json
        - tls-gateway
        - edge-routing
        - postman-echo-transaction
      mode: quorum
      quorum: 4