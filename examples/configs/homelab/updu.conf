# Example for a homelab or small internal deployment.
# If you monitor loopback or private hosts directly, remember the backend's
# SSRF protection and set the matching allow-localhost environment option.
# Replace any replace-me secrets before deploying this sample.

host: 0.0.0.0
port: 3000
base_url: https://status.lab.example
log_level: info
password_policy: strong

monitors:
  - id: grafana-ui
    name: Grafana UI
    type: https
    groups: [Apps]
    interval: 1m
    config:
      url: https://grafana.lab.example/login
      expected_status: 200
      warn_days: 7
      skip_tls_verify: true

  - id: proxmox-ssh
    name: Proxmox SSH
    type: ssh
    groups: [Infra]
    interval: 2m
    config:
      host: proxmox.lab.example
      port: 22

  - id: nas-smb-port
    name: NAS SMB Port
    type: tcp
    groups: [Storage]
    interval: 2m
    config:
      host: nas.lab.example
      port: 445

  - id: redis-cache
    name: Redis Cache
    type: redis
    groups: [Data]
    interval: 1m
    config:
      host: redis.lab.example
      port: 6379
      database: 0
      password: replace-me

  - id: app-postgres
    name: App Postgres
    type: postgres
    groups: [Data]
    interval: 2m
    config:
      host: postgres.lab.example
      port: 5432
      user: monitor
      password: replace-me
      database: app
      ssl_mode: disable

  - id: smtp-relay
    name: SMTP Relay
    type: smtp
    groups: [Infra]
    interval: 5m
    config:
      host: mail.lab.example
      port: 587
      require_tls: true

  - id: nightly-backup
    name: Nightly Backup
    type: push
    groups: [Jobs]
    interval: 24h
    config:
      token: nightly-backup-heartbeat