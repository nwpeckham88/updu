# Docker Compose oriented example.
# Use Docker service names instead of localhost when updu runs in the same
# compose network as the services it monitors.
# Replace any replace-me secrets before deploying this sample.
#
# Example additions to docker-compose.yml:
#   volumes:
#     - ./examples/configs/compose/updu.conf:/config/updu.conf:ro
#   environment:
#     - UPDU_CONF_PATH=/config/updu.conf

host: 0.0.0.0
port: 3000
base_url: http://localhost:3000
db_path: /data/updu.db
log_level: info
password_policy: strong

monitors:
  - id: web-http
    name: Web HTTP
    type: http
    groups: [Compose]
    interval: 1m
    config:
      url: http://web:8080/healthz
      expected_status: 200

  - id: api-json
    name: API JSON Health
    type: json
    groups: [Compose]
    interval: 30s
    config:
      url: http://api:8080/health
      field: status
      expected_value: ok

  - id: postgres-db
    name: Postgres DB
    type: postgres
    groups: [Compose]
    interval: 1m
    config:
      host: postgres
      port: 5432
      user: monitor
      password: replace-me # Change before deploying.
      database: app
      ssl_mode: disable

  - id: redis-cache
    name: Redis Cache
    type: redis
    groups: [Compose]
    interval: 1m
    config:
      host: redis
      port: 6379
      database: 0

  - id: mailhog-smtp
    name: Mailhog SMTP
    type: smtp
    groups: [Compose]
    interval: 5m
    config:
      host: mailhog
      port: 1025
      require_tls: false