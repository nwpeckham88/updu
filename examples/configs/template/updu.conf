# updu starter template
# Valid minimal config plus commented examples for every built-in monitor type.
# For a fully populated working sample, run `updu --demo-config` or inspect
# sample.updu.conf.

host: 0.0.0.0
port: 3000
base_url: https://status.example.com
db_path: ./data/updu.db
log_level: info
session_ttl_days: 7
password_policy: strong
worker_pool_size: 4
min_interval_s: 30

monitors: []

# Example monitor types:
#   http, json, tcp, ping, dns, ssl, ssh, push, websocket,
#   smtp, udp, redis, postgres, mysql, mongo, https,
#   dns_http, transaction, composite, grpc

