name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
    steps:
      - name: Validate tag format
        id: parse
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! echo "${REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::tag '${REF_NAME}' does not match vX.Y.Z[-suffix]"
            exit 1
          fi
          echo "version=${REF_NAME}" >> "$GITHUB_OUTPUT"
          if echo "${REF_NAME}" | grep -q -- '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
          - target: linux-amd64-oidc
          - target: linux-armv6
          - target: linux-armv6-oidc
          - target: linux-armv7
          - target: linux-armv7-oidc
          - target: linux-arm64
          - target: linux-arm64-oidc
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-frontend
      - name: Build
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          # COMMIT short form to keep ldflags compact.
          SHORT_COMMIT="${COMMIT:0:7}"
          make "build-${{ matrix.target }}" \
            VERSION="$VERSION" \
            COMMIT="$SHORT_COMMIT" \
            BUILD_DATE="$BUILD_DATE"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: updu-${{ matrix.target }}
          path: bin/updu-${{ matrix.target }}
          retention-days: 7
          if-no-files-found: error

  smoke:
    name: Smoke test (linux-amd64)
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: updu-linux-amd64
          path: ./smoke
      - name: Verify version output matches tag
        env:
          EXPECTED: ${{ needs.validate-tag.outputs.version }}
        run: |
          set -euo pipefail
          chmod +x ./smoke/updu-linux-amd64
          OUT="$(./smoke/updu-linux-amd64 version)"
          echo "binary said: $OUT"
          echo "$OUT" | grep -F "$EXPECTED" >/dev/null \
            || { echo "::error::binary version '$OUT' does not contain tag '$EXPECTED'"; exit 1; }

  release:
    name: Publish GitHub Release
    needs: [validate-tag, build, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release-binaries
          find artifacts -type f -exec mv {} release-binaries/ \;
          (cd release-binaries && sha256sum * > checksums.txt)
          ls -l release-binaries
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.validate-tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-binaries/*

  docker:
    name: Publish Docker image (GHCR)
    needs: [validate-tag, smoke]
    if: ${{ vars.PUBLISH_DOCKER == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
          PRERELEASE: ${{ needs.validate-tag.outputs.prerelease }}
        run: |
          set -euo pipefail
          REPO_LC="${REPO,,}"
          TAGS="ghcr.io/${REPO_LC}:${VERSION}"
          if [ "$PRERELEASE" = "false" ]; then
            TAGS="${TAGS},ghcr.io/${REPO_LC}:latest"
          fi
          {
            echo "tags=${TAGS}"
            echo "build_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_OUTPUT"
      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.validate-tag.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.tags.outputs.build_date }}
            BUILD_TAGS=
          provenance: false
