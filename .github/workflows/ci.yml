name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        run: |
          cd frontend
          pnpm install
      - name: Run SvelteKit Checks
        run: |
          cd frontend
          pnpm run check
      - name: Build Frontend
        run: |
          cd frontend
          pnpm run build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Build Frontend (for go:embed)
        run: |
          cd frontend && pnpm install && pnpm run build && cd ..
          mkdir -p cmd/updu/frontend
          rm -rf cmd/updu/frontend/build
          cp -r frontend/build cmd/updu/frontend/build
      - name: Run Vet
        run: go vet ./...
      - name: Run Vet (OIDC)
        run: go vet -tags oidc ./...
      - name: Run Tests
        run: go test -v -race ./...
      - name: Run OIDC Tests
        run: go test -v -race -tags oidc ./internal/api -run TestAPI_OIDC_
      - name: Verify Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/updu
      - name: Verify Build (OIDC)
        run: CGO_ENABLED=0 go build -tags oidc -o /dev/null ./cmd/updu
      - name: Run Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install
      - name: Install Playwright browser
        run: |
          cd frontend
          pnpm run test:e2e:install
      - name: Run frontend Playwright E2E
        run: make e2e-frontend
      - name: Run frontend Playwright E2E (OIDC smoke)
        run: make e2e-frontend-oidc
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
