name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v3
        with:
          version: "9"
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Type-check (svelte-check)
        working-directory: frontend
        run: pnpm run check
      - name: Build
        working-directory: frontend
        run: pnpm run build

  backend:
    name: Backend (vet, test, vuln, build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-frontend
      - name: make vet
        run: make vet
      - name: Run tests
        run: go test -v -race ./...
      - name: Run OIDC tests
        run: go test -v -race -tags oidc ./internal/api -run TestAPI_OIDC_
      - name: Verify build (default)
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/updu
      - name: Verify build (oidc)
        run: CGO_ENABLED=0 go build -tags oidc -o /dev/null ./cmd/updu
      - name: make vuln
        run: make vuln

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-frontend
      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm run test:e2e:install
      - name: make e2e-frontend
        run: make e2e-frontend
      - name: make e2e-frontend-oidc
        run: make e2e-frontend-oidc
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7
