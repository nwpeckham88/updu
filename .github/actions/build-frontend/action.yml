name: Setup toolchain & build frontend
description: |
  Provisions Node, pnpm, Go and builds the SvelteKit frontend, syncing the
  output into cmd/updu/frontend/build so the Go build can embed it.

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "22"
  pnpm-version:
    description: pnpm version
    required: false
    default: "9"
  go-version:
    description: Go toolchain version. When empty, the version is read from go.mod.
    required: false
    default: ""
  setup-go:
    description: Whether to install Go (set to "false" to skip).
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Go (from go.mod)
      if: ${{ inputs.setup-go == 'true' && inputs.go-version == '' }}
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        check-latest: true
        cache: true

    - name: Setup Go (pinned)
      if: ${{ inputs.setup-go == 'true' && inputs.go-version != '' }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Build frontend (delegates to Makefile)
      shell: bash
      run: make build-frontend
